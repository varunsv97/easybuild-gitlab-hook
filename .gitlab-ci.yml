execute_builds_genoa:
  stage: build
  needs:
    - job: generate_pipeline_genoa
      artifacts: true
  trigger:
    <<: &child_trigger_defaults
      strategy: depend
      forward:
        yaml_variables: true
        pipeline_variables: true
    include:
      - artifact: easybuild-child-pipeline-genoa.yml
        job: generate_pipeline_genoa
  variables:
    <<: *genoa_variables
    PARENT_PIPELINE_ID: $CI_PIPELINE_ID
    SCHEDULER_PARAMETERS: "--nodes=1 --ntasks-per-node=8 --partition=cpu-genoa --mem=200G"
  rules:
    - if: *select_genoa
      when: always
    - when: never

