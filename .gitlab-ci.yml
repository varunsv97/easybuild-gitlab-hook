execute_builds_genoa:
  stage: build
  needs:
    - job: generate_pipeline_genoa
      artifacts: true
  trigger:
    include:
      - artifact: easybuild-child-pipeline-genoa.yml
        job: generate_pipeline_genoa
    strategy: depend
    forward:
      yaml_variables: true
      pipeline_variables: true
  variables:
    PARENT_PIPELINE_ID: $CI_PIPELINE_ID
    ARCH: "genoa"
    PARTITION: "cpu-genoa"
    NTASKS_PER_NODE: "8"
    CUDA_COMPUTE_OPTION: ""
    SCHEDULER_PARAMETERS: "--nodes=1 --ntasks-per-node=8 --partition=cpu-genoa --mem=200G"
  rules:
    - if: '$SELECT_ARCHITECTURES == "all" || $SELECT_ARCHITECTURES =~ /(^|,)genoa(,|$)/'
      when: manual
    - when: never

