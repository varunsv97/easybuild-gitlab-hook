stages: ["test", "generate", "build"]

workflow:
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      variables:
        EB_PATH: "/data/rosi/shared/eb/easybuild"
        CUSTOM_CI_BUILDS_DIR: "/bigdata/rz/rosi_easybuild"
    # Please add paths where you want to store the generated modules and git clone respectively.
    - when: always
      variables:
        EB_PATH: ""
        CUSTOM_CI_BUILDS_DIR: ""

variables:
  # Select build targets from "Run pipeline": use "all" or comma-separated ARCH names.
  # Valid values must match the `generate_pipeline_<arch>` / `execute_builds_<arch>` jobs below.
  # Example: genoa,ampere,hopper
  # Default to all supported partitions except blackwell.
  SELECT_ARCHITECTURES: "genoa,skylake,milan,turin,volta,ampere,hopper"

  # Do NOT change the below variables
  EB_SOURCE: "/bigdata/rz/sudhar46/easybuild_manual_test/codebase/eb_env"
  SOURCE_PATH: "/data/rosi/shared/eb/easybuild_source"
  TARGET_EASYSTACK: "easybuild-easystack.yml"

default:
  tags: ['rosi-slurm']
  before_script:
    - ml python/3.14
    - ml $ARCH
    - source $EB_SOURCE/bin/activate
  id_tokens:
    CI_JOB_JWT:
      aud: "https://codebase.helmholtz.cloud"

test_gitlab_ci_hook:
  stage: test
  before_script: []
  script:
    - ml python/3.14
    - python3 --version
    - python3 -m unittest discover -s tests -p "test_*.py" -v
  rules:
    - changes:
        - gitlab_ci_hook.py
        - tests/test_gitlab_ci_hook.py
        - .gitlab-ci.yml

.generate_pipeline_template: &generate_pipeline_template
  stage: generate
  script:
    - echo "Generating EasyBuild GitLab CI pipeline"
    - echo "ARCH=$ARCH PARTITION=$PARTITION NTASKS_PER_NODE=$NTASKS_PER_NODE"
    - echo "CUDA_COMPUTE_OPTION=$CUDA_COMPUTE_OPTION"
    - ls -la gitlab_ci_hook.py || echo "Hook file NOT FOUND"
    - |
      eb --hooks=gitlab_ci_hook.py \
         --easystack=${TARGET_EASYSTACK} \
         --installpath=${EB_PATH}/${ARCH} \
         --installpath-modules=${EB_PATH}/${ARCH}/modules \
         --tmp-logdir=eblog --buildpath=ebbuild \
         --sourcepath=${SOURCE_PATH} \
         --robot --robot-paths=${CI_PROJECT_DIR}/custom_easyconfigs: \
         --module-naming-scheme=CategorizedHMNS \
         --insecure-download --disable-mpi-tests --skip-test-step --skip-test-cases \
         --accept-eula-for=Intel-oneAPI,CUDA,NVHPC,cuDNN \
         --trace --max-parallel=${NTASKS_PER_NODE} \
         ${CUDA_COMPUTE_OPTION}
    - mv easybuild-child-pipeline.yml easybuild-child-pipeline-${ARCH}.yml
    - cat easybuild-child-pipeline-${ARCH}.yml
  artifacts:
    paths:
      - easybuild-child-pipeline-${ARCH}.yml
    expire_in: 1 week

# Generate child pipeline per architecture so dependency/install paths are arch-specific.
generate_pipeline_genoa:
  <<: *generate_pipeline_template
  variables: &genoa_variables
    ARCH: "genoa"
    PARTITION: "cpu-genoa"
    NTASKS_PER_NODE: "8"
    CUDA_COMPUTE_OPTION: ""
  rules:
    - if: &select_genoa '$SELECT_ARCHITECTURES == "all" || $SELECT_ARCHITECTURES =~ /(^|,\s*)genoa(\s*,|$)/'
    - when: never

generate_pipeline_skylake:
  <<: *generate_pipeline_template
  variables: &skylake_variables
    ARCH: "skylake"
    # Adjust `PARTITION`/resources to match your cluster naming for Skylake nodes.
    PARTITION: "cpu-skylake"
    NTASKS_PER_NODE: "8"
    CUDA_COMPUTE_OPTION: ""
  rules:
    - if: &select_skylake '$SELECT_ARCHITECTURES == "all" || $SELECT_ARCHITECTURES =~ /(^|,\s*)skylake(\s*,|$)/'
    - when: never

